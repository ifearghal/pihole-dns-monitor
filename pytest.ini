[pytest]
# Pytest configuration for PiHole Monitor

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-branch

# Test paths
testpaths = test

# Markers for test categorization
markers =
    security: Security-critical tests (path traversal, injection, validation)
    slow: Tests that take longer to run
    integration: Integration tests requiring external resources
    unit: Unit tests (default)

# Coverage configuration
[coverage:run]
source = src
omit = 
    */test/*
    */tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
